  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sand: #f5f0e8;
      --bark: #2c2416;
      --wood: #7a4f2a;
      --muted: #9a7c5a;
      --light-sand: #e8dfd0;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--sand);
      color: var(--bark);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 120px 20px 52px;
      background: linear-gradient(180deg, #c8e4f2 0%, var(--sand) 100%);
      overflow: hidden;
    }

    @media (max-width: 640px) {
      header {
        padding: 120px 20px 16px;
        background: linear-gradient(180deg, #c8e4f2 0%, #c8e4f2 40%, var(--sand) 100%);
      }
      .phrase { margin-top: 8px; }
      .wave { display: none; }
      .carousel-section { margin: 12px auto 0; }
      .cta { padding: 32px 20px 48px; }
    }

    .sun {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px; height: 50px;
      background: #f5c842;
      border-radius: 50%;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 10px rgba(245,200,66,.18), 0 0 0 22px rgba(245,200,66,.08); }
      50%      { box-shadow: 0 0 0 18px rgba(245,200,66,.22), 0 0 0 36px rgba(245,200,66,.10); }
    }

    .birds { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .bird  { position: absolute; font-size: 18px; opacity: .4; animation: fly linear infinite; }
    .bird:nth-child(1) { top: 22px; animation-duration: 14s; }
    .bird:nth-child(2) { top: 38px; font-size: 12px; animation-duration: 18s; animation-delay: -5s; }
    .bird:nth-child(3) { top: 52px; font-size: 10px; animation-duration: 22s; animation-delay: -11s; }
    @keyframes fly { from { left: -60px; } to { left: calc(100% + 60px); } }

    .tagline {
      font-size: .72rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 9vw, 5.2rem);
      font-weight: 400;
      line-height: 1;
    }
    header h1 em { font-style: italic; color: var(--wood); }

    .phrase {
      margin-top: 18px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(.95rem, 2.5vw, 1.15rem);
      color: #6b5540;
    }

    /* ── WAVE ── */
    .wave { display: block; width: 100%; height: 52px; margin-top: -2px; }

    /* ── CAROUSEL ── */
    .carousel-section {
      padding: 0 20px 0;
      max-width: 1080px;
      margin: 32px auto 0;
    }

    .carousel-wrap {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      /* maintain 4:3 on mobile, taller on desktop */
      aspect-ratio: 4/3;
    }

    @media (min-width: 640px) {
      .carousel-wrap { aspect-ratio: 16/9; }
    }

    .carousel-track {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .8s ease;
    }
    .slide.active { opacity: 1; }

    .slide img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* gradient overlay bottom */
    .slide::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(transparent, rgba(44,36,22,.45));
      pointer-events: none;
    }

    /* arrows */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(245,240,232,.82);
      border: none;
      border-radius: 50%;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .arrow:hover { background: rgba(245,240,232,1); transform: translateY(-50%) scale(1.08); }
    .arrow svg { width: 20px; height: 20px; stroke: var(--bark); fill: none; stroke-width: 2; }
    .arrow-prev { left: 14px; }
    .arrow-next { right: 14px; }

    @media (max-width: 480px) {
      .arrow { width: 36px; height: 36px; }
      .arrow svg { width: 16px; height: 16px; }
      .arrow-prev { left: 10px; }
      .arrow-next { right: 10px; }
    }

    /* dots */
    .dots {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(245,240,232,.5);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background .2s, transform .2s;
    }
    .dot.active {
      background: rgba(245,240,232,1);
      transform: scale(1.4);
    }

    /* counter */
    .counter {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 10;
      font-size: .7rem;
      letter-spacing: .1em;
      color: rgba(245,240,232,.85);
      background: rgba(44,36,22,.35);
      padding: 4px 10px;
      border-radius: 100px;
    }

    /* ── CTA ── */
    .cta {
      text-align: center;
      padding: 56px 20px 72px;
    }
    .cta-label {
      font-size: .72rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .cta a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--bark);
      color: var(--sand);
      text-decoration: none;
      padding: 18px 44px;
      border-radius: 100px;
      font-size: .95rem;
      letter-spacing: .04em;
      transition: background .2s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cta a:hover { background: var(--wood); transform: translateY(-2px); }
    .cta a:active { transform: translateY(0); }
    .cta a svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; opacity: .75; }

    /* ── FOOTER ── */
    .footer-wave { display: block; width: 100%; }
    footer {
      background: var(--bark);
      color: var(--muted);
      text-align: center;
      padding: 28px 20px;
      font-size: .78rem;
      letter-spacing: .06em;
      line-height: 1.8;
    }
    footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 3px; }
  </style>
</head>
<body>

  <header>
    <div class="sun" aria-hidden="true"></div>
    <div class="birds" aria-hidden="true">
      <span class="bird">〜</span>
      <span class="bird">〜</span>
      <span class="bird">〜</span>
    </div>
    <p class="tagline">Pontal do Atalaia &bull; Arraial do Cabo</p>
    <h1>Solar <em>Atalaia</em></h1>

  </header>

  <svg class="wave" viewBox="0 0 1440 52" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M0,26 C240,52 480,0 720,26 C960,52 1200,0 1440,26 L1440,52 L0,52 Z" fill="#f5f0e8"/>
    <path d="M0,36 C360,10 720,48 1080,18 C1260,6 1380,36 1440,42 L1440,52 L0,52 Z" fill="#f5f0e8" opacity=".65"/>
  </svg>

  <section class="carousel-section" aria-label="Galeria de fotos do Solar Atalaia">
    <div class="carousel-wrap" id="carousel">

      <!-- slides injected by JS -->

      <button class="arrow arrow-prev" id="prev" aria-label="Foto anterior">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="arrow arrow-next" id="next" aria-label="Próxima foto">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
      </button>

      <div class="dots" id="dots" role="tablist" aria-label="Selecionar foto"></div>
      <div class="counter" id="counter" aria-live="polite"></div>
    </div>
  </section>

  <div class="cta">
    <p class="cta-label">Reserve sua estadia</p>
    <a href="https://airbnb.com/h/solar-atalaia" target="_blank" rel="noopener noreferrer">

      <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </a>

  <svg class="footer-wave" viewBox="0 0 1440 36" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M0,18 C480,36 960,0 1440,18 L1440,36 L0,36 Z" fill="#2c2416"/>
  </svg>
  <footer>
    <p>&copy; 2026 Solar Atalaia &mdash; Pontal do Atalaia, Arraial do Cabo, RJ</p>
    <p style="margin-top:6px">Casa de temporada &bull; <a href="https://airbnb.com/h/solar-atalaia" target="_blank" rel="noopener">Reservar no Airbnb</a></p>
  </footer>

  <script>
    const images = [
      { src: 'imgs/foto-19.jpg', alt: 'Piscina infinita com vista para o oceano em Arraial do Cabo' },
      { src: 'imgs/foto-13.jpg', alt: 'Sala de estar com vista panorâmica para o mar' },
      { src: 'imgs/foto-05.jpg', alt: 'Pôr do sol visto da piscina do Solar Atalaia' },
      { src: 'imgs/foto-09.jpg', alt: 'Piscina com vista para o Atlântico' },
      { src: 'imgs/foto-11.jpg', alt: 'Deck coberto com rede e vista para o mar' },
      { src: 'imgs/foto-07.jpg', alt: 'Área externa do Solar Atalaia' },
      { src: 'imgs/foto-10.jpg', alt: 'Ambiente aconchegante com vista para o mar' },
      { src: 'imgs/foto-12.jpg', alt: 'Interior do Solar Atalaia' },
      { src: 'imgs/foto-17.jpg', alt: 'Jardim e área verde do Solar Atalaia' },
      { src: 'imgs/foto-03.jpg', alt: 'Detalhes da propriedade Solar Atalaia' },
      { src: 'imgs/foto-04.jpg', alt: 'Área de descanso do Solar Atalaia' },
      { src: 'imgs/foto-01.jpg', alt: 'Solar Atalaia – casa de temporada em Arraial do Cabo' },
      { src: 'imgs/foto-02.jpg', alt: 'Ambiente externo do Solar Atalaia' },

    ];

    // Fisher-Yates shuffle
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const order = shuffle(images);
    const carousel = document.getElementById('carousel');
    const dotsEl   = document.getElementById('dots');
    const counter  = document.getElementById('counter');
    let current = 0;
    let timer;

    // Build slides
    order.forEach((img, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === 0 ? ' active' : '');
      slide.setAttribute('role', 'tabpanel');
      const image = document.createElement('img');
      image.src = img.src;
      image.alt = img.alt;
      image.loading = i === 0 ? 'eager' : 'lazy';
      slide.appendChild(image);
      carousel.insertBefore(slide, document.getElementById('prev'));

      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('role', 'tab');
      dot.setAttribute('aria-label', 'Foto ' + (i + 1));
      dot.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(dot);
    });

    const slides = carousel.querySelectorAll('.slide');
    const dots   = dotsEl.querySelectorAll('.dot');

    function updateCounter() {
      counter.textContent = (current + 1) + ' / ' + order.length;
    }

    function goTo(n) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (n + order.length) % order.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      updateCounter();
      resetTimer();
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    function resetTimer() {
      clearInterval(timer);
      // random interval between 4s and 7s
      const delay = 4000 + Math.random() * 3000;
      timer = setInterval(next, delay);
    }

    document.getElementById('next').addEventListener('click', next);
    document.getElementById('prev').addEventListener('click', prev);

    // Touch / swipe
    let touchStartX = 0;
    carousel.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    carousel.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) dx < 0 ? next() : prev();
    }, { passive: true });

    updateCounter();
    resetTimer();

    // Pause on tab hidden
    document.addEventListener('visibilitychange', () => {
      document.hidden ? clearInterval(timer) : resetTimer();
    });
  </script>
</body>
